name: tenkbooks
description: 万卷书苑 - 10kbooks Digital Reading Platform
publish_to: 'none'
version: 1.1.0+11

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Routing
  go_router: ^13.2.0

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0

  # Forms
  flutter_form_builder: ^9.5.0
  form_builder_validators: ^11.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Utils
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  share_plus: ^7.2.1
  version: ^3.0.2

  # PDF Reader
  # flutter_pdfview: ^1.3.2  # removed, using syncfusion
  syncfusion_flutter_pdfviewer: ^27.1.48

  # Notifications
  flutter_local_notifications: ^16.3.2

  # Other
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

  flutter_gen_runner: ^5.4.0

  # Testing
  mocktail: ^1.0.3
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/l10n/

  # Fonts (using system default)

  # Localization
  generate: true
